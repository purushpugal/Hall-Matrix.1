services:
  - type: web
    name: hall-matrix-backend
    env: docker
    region: singapore
    plan: free
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: hall-matrix-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: hall-matrix-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hall-matrix-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: hall-matrix-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: hall-matrix-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hall-matrix-db
          property: password
      - key: FRONTEND_URL
        fromService:
          type: web
          name: hall-matrix-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: LOG_CHANNEL
        value: stderr

  - type: web
    name: hall-matrix-frontend
    env: static
    plan: free
    rootDir: ./frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hall-matrix-backend
          envVarKey: RENDER_EXTERNAL_URL
        # Append /api manually in Render dashboard if needed, or we handle it in frontend. 
        # But wait, we can't concatenate in render.yaml directly easily.
        # So I will edit frontend code to append '/api' if not present!
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: hall-matrix-db
    plan: free
    databaseName: hall_matrix_db
    user: hall_matrix_user
